openapi: 3.1.0
info:
  title: Marketplace API
  version: 0.1.0
servers:
  - url: http://localhost:8080
paths:
  /health:
    get:
      summary: Health Check
      responses:
        '200':
          description: Service is operational
  /ready:
    get:
      summary: Ready Check
      responses:
        '200':
          description: Service is ready
  /auth/register:
    post:
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User registered
        '400':
          description: Validation error
        '409':
          description: User already exists
  /auth/login:
    post:
      summary: Login with creds
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Access and refresh tokens
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenPair'
        '401':
          descriptions: Unauthorized
  /auth/refresh:
    post:
      summary: Rotate refresh tokens
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token:
                  type: string
      responses:
        '200':
          description: New token pair
  /auth/logout:
    post:
      summary: Revoke refresh token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token:
                  type: string
      responses:
        '200':
          description: Logged out
  /auth/reset-password:
    post:
      summary: Request password reset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        '202':
          description: Password reset requested
  /auth/reset-password/confirm:
    post:
      summary: Confirm password reset token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetConfirmRequest'
      responses:
        '202':
          description: Password updated
components:
  schemas:
    RegisterRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
    LoginRequest:
      allOf:
        - $ref: '#/components/schemas/RegisterRequest'
    TokenPair:
      type: object
      requred: [access_token, refresh_token]
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
    ResetConfirmRequest:
      type: object
      requred: [token, new_password]
      properties:
        token:
          type: string
        new_password:
          type: string
          minLength: 8