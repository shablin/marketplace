syntax = "proto3";

package marketplace.cart.v1;

option go_package = "github.com/shablin/marketplace/proto/cart/v1;cartv1";

service CartService {
    rpc GetCart(GetCartRequest) returns (GetCartResponse);
    rpc AddItem(AddItemRequest) returns (AddItemResponse);
}

message GetCartRequest {
    string user_id = 1;
    bool active_only = 2;
}

message CartItem {
    string product_id = 1;
    uint32 quantity = 2;
    uint32 stock = 3;
}

message GetCartResponse {
    string user = 1;
    string cart_id = 2;
    bool active = 3;
    repeated CartItem items = 4;
}

message AddItemRequest {
    string user_id = 1;
    string product_id = 2;
    uint32 quantity = 3;
    string idempotency_key = 4;
}

message AddItemResponse {
    string user_id = 1;
    string cart_id = 2;
}